<div class="bubble" (mouseover)="hoverBubble=true" (mouseleave)="hoverBubble=false">
    <div class="content">
        <div class="header">
            <h4>{{name}}</h4>
            <p>Project <span class="primary">{{project}}</span></p>
        </div>
        <div class="scroll_wrapper">
            <p class="quote" (scroll)="onScroll($event)">"{{quote}}"</p>
            @if (scrollbehavior){
                <span [ngClass]="scrollable ? '' : 'hide'">...</span>      
            }      
        </div>
        <a href={{link}} target="_blank">Linked in Profile</a>
    </div>
    @if (hoverBubble){
        <app-img-ellipse2-hover [size]="400" class="default_background"/>
    }
    @else {
        <app-img-ellipse2 [size]="400" class="default_background"/>
    }
    <app-img-ellipse7 [size]="290" class="resp_background"/>
</div>
